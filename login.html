<!DOCTYPE html>
<html>
<head>
    <title>Skill Swap - Login</title>
    <link rel="stylesheet" href="style.css">
    <script>
    function validateLogin(){

        var email = document.getElementById("loginemail").value.trim();
        var password = document.getElementById("pswd").value.trim();

        if(email === "" || password === ""){
            alert("Please enter all login details");
            return false;
        }

        if(password.length < 8){
            alert("Password must be at least 8 characters");
            return false;
        }

        return true;
    }
    </script>
</head>
<body>
    <div class="container" align="center">
        <h2>Skill Swap Login</h2><br><br>
        <form onsubmit="return validateLogin()" autocomplete="off" action="backend/login.php" method="POST">

        <label for="loginemail">Enter email:</label>
        <input type="email" id="loginemail" name="email" placeholder="user@gmail.com" autocomplete="off" required>

        <br><br>

        <label for="pswd">Enter your password:</label>
        <input type="password" id="pswd" name="password" placeholder="password" required autocomplete="new-password">

        <br><br>

        <button type="submit">Login</button>

    </form>
    <p>Don't have an account? <a href="Registration.html">Register Here</a></p>
    </div>
</body>
</html>
