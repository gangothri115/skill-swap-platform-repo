<!DOCTYPE html>
<html>
<head>
    <title>Skill-Swap Registration</title>
    <link rel="stylesheet" href="style.css">
    <script>
    function validateregistration() {

        var name = document.getElementById("name").value.trim();
        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("pswd").value;
        var confirmpassword = document.getElementById("confpassword").value;
        var skill_offer = document.getElementById("skill_offer").value.trim();
        var skill_want = document.getElementById("skill_want").value.trim();

        if(name === ""){
            alert("Please enter name");
            return false;
        }

        if(email === ""){
            alert("Enter your email address");
            return false;
        }

        if(password.length < 8){
            alert("Password must be at least 8 characters");
            return false;
        }

        if(password !== confirmpassword){
            alert("Passwords do not match");
            return false;
        }

        if(skill_offer === ""){
            alert("Enter the skill you offer");
            return false;
        }

        if(skill_want === ""){
            alert("Enter the skill you want");
            return false;
        }

        return true;
    }
    </script>
</head>
<body>
<div class="container">
    <h1>Skill Swap - Registration Form</h1>
    <form onsubmit="return validateregistration()" action="backend/register.php" method="POST">
        <label for="name">User Name:</label>
        <input type="text" id="name" name="name" maxlength="15" required autocomplete="off">

        <label for="email">Email ID:</label>
        <input type="email" id="email" name="email" placeholder="user@gmail.com" required autocomplete="off">

        <label for="pswd">Password:</label>
        <input type="password" id="pswd" name="password" placeholder="********" required autocomplete="new-password">

        <label for="confpassword">Confirm Password:</label>
        <input type="password" id="confpassword" name="confpassword" required>

        <label for="skill_offer">Skill You Offer:</label>
        <input type="text" id="skill_offer" name="skill_offer" required>

        <label for="skill_want">Skill You Want:</label>
        <input type="text" id="skill_want" name="skill_want" required>

        <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="login.html">Login Here</a></p>
</div>
</body>
</html>
